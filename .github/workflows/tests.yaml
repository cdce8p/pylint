name: Tests

on:
  push:
    branches:
      - main
      - "maintenance/**"
      - "python-3.14-*"
    paths-ignore:
      - doc/data/messages/**
  pull_request:
    branches:
      - main
      - "maintenance/**"
  workflow_dispatch:

env:
  CACHE_VERSION: 5
  KEY_PREFIX: venv

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: run / ${{ matrix.python-version }} / ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-13
          - macos-14
          - macos-15
          # - ubuntu-22.04
          # - ubuntu-24.04
          # - windows-2022
          # - windows-2025
        python-version:
          - "3.13.6"
          - "3.14.0-alpha.6"
          - "3.14.0-alpha.7"
          - "3.14.0-beta.1"
          - "3.14.0-beta.2"
          - "3.14.0-beta.3"
          - "3.14.0-rc.1"
    runs-on: ${{ matrix.os }}
    outputs:
      python-key: ${{ steps.generate-python-key.outputs.key }}
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        id: python
        # Custom with PyPy fix: https://github.com/actions/setup-python/pull/1110
        uses: cdce8p/setup-python@v5.6.0-c1
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true

      - name: Create Python virtual environment
        if: runner.os != 'Windows'
        run: |
          python -m venv venv
          . venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade --requirement requirements_test.txt
      - name: Create Python virtual environment
        if: runner.os == 'Windows'
        run: |
          python -m venv venv
          . venv\\Scripts\\activate
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade --requirement requirements_test_min.txt

      - name: Run pytest
        if: runner.os != 'Windows'
        run: |
          . venv/bin/activate
          pip install . --no-deps
          python -VV
          clang -v
          pip list | grep 'astroid\|pylint'
          python -m pytest tests/test_functional.py::test_functional[regression_5408]
      - name: Run pytest
        if: runner.os == 'Windows'
        run: |
          . venv\\Scripts\\activate
          pip install . --no-deps
          pip list | grep 'astroid\|pylint'
          python -m pytest tests/test_functional.py::test_functional[regression_5408]
